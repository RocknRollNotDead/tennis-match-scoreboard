
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DB_URL: db:5432/mydb
      DB_LOGIN: postgres
      DB_PASSWORD: mypassword
    depends_on:
      - db
    ports:
      - "8080:8080"


volumes:
  pgdata: